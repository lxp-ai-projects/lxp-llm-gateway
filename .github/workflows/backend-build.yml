name: Backend Build

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin-api/**'
      - 'apps/gateway-api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/backend-build.yml'
  pull_request:
    paths:
      - 'apps/admin-api/**'
      - 'apps/gateway-api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/backend-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      #- name: Typecheck backend scope
      #  run: pnpm exec turbo run typecheck --filter=@lxp/admin-api --filter=@lxp/gateway-api

      - name: Test backend scope
        run: pnpm exec turbo run test --filter=@lxp/admin-api --filter=@lxp/gateway-api

      - name: Coverage admin-api
        continue-on-error: true
        run: pnpm --filter @lxp/admin-api coverage

      - name: Coverage gateway-api
        continue-on-error: true
        run: pnpm --filter @lxp/gateway-api coverage

      - name: Build backend scope
        run: pnpm exec turbo run build --filter=@lxp/admin-api --filter=@lxp/gateway-api
