name: Frontend Build

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin-web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    paths:
      - 'apps/admin-web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/frontend-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend scope
        run: pnpm exec turbo run typecheck --filter=@lxp/admin-web

      - name: Test frontend scope
        run: pnpm exec turbo run test --filter=@lxp/admin-web

      - name: Coverage frontend scope
        continue-on-error: true
        run: pnpm --filter @lxp/admin-web test:coverage

      - name: Upload frontend coverage artifact
        if: ${{ always() && hashFiles('apps/admin-web/coverage/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-coverage
          path: apps/admin-web/coverage

      - name: Build frontend scope
        run: pnpm exec turbo run build --filter=@lxp/admin-web
